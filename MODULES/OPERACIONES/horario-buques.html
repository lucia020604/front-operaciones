<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario de Buques | Caleb Brett</title>
<link rel="stylesheet" href="../../ASSETS/CSS/main.css">
<link rel="stylesheet" href="../../ASSETS/CSS/operaciones.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="topbar">
  <div class="topbar-left">
    <button class="hamburger" id="toggleSidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
    </button>
    <img src="../../ASSETS/IMG/logo2.png"  class="topbar-logo" alt="Caleb Brett">
    <nav class="topbar-nav">
      <a href="../INICIO/reporte-cabotaje.html" class="nav-item">Inicio</a>
      <a href="../SEGURIDAD/roles.html" class="nav-item">Seguridad</a>
      <a href="#" class="nav-item active">Operaciones</a>
      <a href="#" class="nav-item">Reportes</a>
    </nav>
  </div>
  <div class="topbar-right">
    <button class="icon-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
      <span class="notif-dot"></span>
    </button>
    <div class="user-info">
      <div class="avatar">JE</div>
      <span class="user-name">Juan E.</span>
    </div>
  </div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-title">OPERACIONES</div>
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="distancias-horas.html" class="sidebar-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7m0 13 6-3m-6 3V7m6 10 5.447 2.724A1 1 0 0 0 21 18.382V7.618a1 1 0 0 0-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          <span>Distancias - Horas</span>
        </a>
      </li>
      <li class="sidebar-item active">
        <a href="horario-buques.html" class="sidebar-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
          <span>Horario de Buques</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="retrasos-naves.html" class="sidebar-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
          <span>Retrasos de Naves</span>
        </a>
      </li>
    </ul>
    <a href="../../index.html" class="btn-logout">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
      <span>Cerrar sesión</span>
    </a>
  </aside>

  <!-- CONTENIDO -->
  <main class="content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Horario de Buques</h1>
        <nav class="breadcrumb">
          <span>Operaciones</span>
          <span class="bc-sep">›</span>
          <span class="bc-active">Horario de Buques</span>
        </nav>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filter-bar">
      <div class="filter-left">
        <div class="select-group">
          <label class="select-label">Cliente</label>
          <select class="select-input" id="filtroCliente">
            <option value="">Todos</option>
            <option>Cliente A</option>
            <option>Cliente B</option>
          </select>
        </div>
        <div class="select-group">
          <label class="select-label">Fecha Desde</label>
          <input type="date" class="select-input" id="fechaDesde">
        </div>
        <div class="select-group">
          <label class="select-label">Fecha Hasta</label>
          <input type="date" class="select-input" id="fechaHasta">
        </div>
        <button class="btn-buscar" onclick="filtrarCalendario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          Buscar
        </button>
        <button class="btn-limpiar" onclick="limpiarFiltrosCalendario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Limpiar filtros
        </button>
      </div>

      <div class="formato-toggle">
        <button class="formato-btn active" data-formato="mes" onclick="cambiarFormato('mes', this)">Mes</button>
        <button class="formato-btn" data-formato="semana" onclick="cambiarFormato('semana', this)">Semana</button>
      </div>
    </div>

    <!-- LEYENDA TURNOS -->
    <div class="leyenda-turnos">
      <span class="leyenda-item"><span class="leyenda-dot turno-1"></span>07:00 - 15:00</span>
      <span class="leyenda-item"><span class="leyenda-dot turno-2"></span>15:00 - 23:00</span>
      <span class="leyenda-item"><span class="leyenda-dot turno-3"></span>23:00 - 07:00</span>
    </div>

    <!-- TABLA DÍA / TURNO x TERMINAL -->
    <div class="horario-wrap">
      <div class="horario-header-nav">
        <button class="cal-nav-btn" onclick="cambiarMes(-1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h3 class="cal-mes-titulo" id="calMesTitulo">Junio 2026</h3>
        <button class="cal-nav-btn" onclick="cambiarMes(1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <div class="horario-scroll">
        <table class="horario-table" id="horarioTable">
          <thead>
            <tr id="horarioHeaderRow">
              <th class="horario-fixed-dia">Día</th>
              <th class="horario-fixed-turno">Turno</th>
            </tr>
          </thead>
          <tbody id="horarioBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL DETALLE OPERACIÓN -->
<div class="modal-overlay" id="modalOperacion">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalOperacionTitulo">Operación</h2>
      <button class="modal-close" onclick="cerrarModal('modalOperacion')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group-modal">
        <label class="modal-label">Terminal</label>
        <input type="text" class="modal-input" id="opTerminal" readonly>
      </div>
      <div class="form-row-modal">
        <div class="form-group-modal">
          <label class="modal-label">Turno</label>
          <input type="text" class="modal-input" id="opTurno" readonly>
        </div>
        <div class="form-group-modal">
          <label class="modal-label">Fecha</label>
          <input type="text" class="modal-input" id="opFecha" readonly>
        </div>
      </div>
      <div class="form-group-modal">
        <label class="modal-label">Personal asignado</label>
        <textarea class="modal-input modal-textarea" id="opPersonal" readonly></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal('modalOperacion')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        Cerrar
      </button>
    </div>
  </div>
</div>

<script src="../../ASSETS/JS/main.js"></script>
<script src="../../ASSETS/JS/operaciones.js"></script>
</body>
</html>
