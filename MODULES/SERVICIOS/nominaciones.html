      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
    </button>
    <img src="../../ASSETS/IMG/logo2.png" class="topbar-logo" alt="Caleb Brett">
    <nav class="topbar-nav">
      <a href="../INICIO/reporte-cabotaje.html" class="nav-item">Inicio</a>
      <a href="nominaciones.html" class="nav-item active">Servicios</a>
      <a href="../OPERACIONES/distancias-horas.html" class="nav-item">Operaciones</a>
      <a href="#" class="nav-item">Reportes</a>
    </nav>
  </div>
  <div class="topbar-right">
    <button class="icon-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>

    <div class="user-menu" id="userMenu">
      <button type="button" class="user-info" id="userMenuToggle">
        <div class="avatar">JE</div>

      </button>
      <div class="user-dropdown" id="userDropdown">
        <a href="../CONFIGURACION/roles.html" class="user-dropdown-item">

          <span>Configuración</span>
        </a>
        <div class="user-dropdown-divider"></div>
        <a href="../../index.html" class="user-dropdown-item user-dropdown-danger" onclick="cerrarSesion()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
          <span>Cerrar sesión</span>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- ===== LAYOUT ===== -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-title">SERVICIOS</div>
    <ul class="sidebar-menu">
      <li class="sidebar-item active">
        <a href="nominaciones.html" class="sidebar-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Nominaciones</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <main class="content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Nominaciones</h1>
        <nav class="breadcrumb">
          <span>Servicio</span>
          <span class="bc-sep">›</span>
          <span class="bc-active">Nominación</span>
        </nav>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filter-bar">
      <div class="filter-left">
        <div class="search-wrap">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          <input type="text" class="search-input" id="searchNominacion" placeholder="Buscar por código, N° PER o contacto..." oninput="aplicarFiltrosNom()">
        </div>
        <div class="select-group">
          <label class="select-label">Cliente</label>
          <select class="select-input" id="filterClienteNom" onchange="aplicarFiltrosNom()">
            <option value="">Seleccione Cliente</option>
          </select>
        </div>
        <div class="date-group">
          <label class="select-label">Fecha inicio</label>
          <input type="date" class="date-input" id="filterInicioNom" onchange="aplicarFiltrosNom()">
        </div>
        <div class="date-group">
          <label class="select-label">Fecha Fin</label>
          <input type="date" class="date-input" id="filterFinNom" onchange="aplicarFiltrosNom()">
        </div>
        <button class="btn-buscar" onclick="aplicarFiltrosNom()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          Buscar
        </button>
        <button class="btn-limpiar" onclick="limpiarFiltrosNom()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Limpiar
        </button>
      </div>
      <button class="btn-nuevo" onclick="irANuevaNominacion()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Nuevo
      </button>
    </div>

    <!-- TABLA -->
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>N° PER</th>
            <th>Cliente</th>
            <th>Contacto</th>
            <th>Buque</th>
            <th>Supervisor</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Estado</th>
            <th>Aceptación</th>
            <th>Opciones</th>
          </tr>
        </thead>
        <tbody id="tbodyNominaciones"></tbody>
      </table>
    </div>

    <!-- PAGINACIÓN -->
    <div class="pagination-bar">
      <div class="pagination-left">
        <span class="pag-text">Mostrar</span>
        <select class="pag-select" id="pagSelectNom" onchange="cambiarFilasNominaciones(+this.value)">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="50">50</option>
        </select>
        <span class="pag-text">registros</span>
      </div>
      <div class="pagination-right" id="pagBtnsNom"></div>
    </div>

  </main>
</div>

<script src="../../ASSETS/JS/data-usuarios.js"></script>
<script src="../../ASSETS/JS/permisos.js"></script>
<script src="../../ASSETS/JS/main.js"></script>
<script src="../../ASSETS/JS/servicios.js"></script>
</body>
</html>
