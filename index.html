<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intertek Caleb Brett – Acceso al Sistema</title>
<link rel="stylesheet" href="ASSETS/CSS/login.css">
</head>
<body>

<div class="login-wrapper">
  <!-- LEFT: Form -->
  <div class="left-panel">
    <div class="logo-mark">
      <img src="ASSETS/IMG/logo2.png" class="logo-img">
    </div>

    <h1 class="login-heading">Sistema<br>Operativo Caleb Brett</h1>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input class="form-input" type="text" id="usuario" placeholder="nombre.usuario" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <!-- <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="new-password"> -->
          <button type="button" class="toggle-pass" onclick="togglePassword()">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="toggle-label">
          <input type="checkbox" class="toggle-input" id="remember">
          <span class="toggle-track"></span>
          Recordar contraseña
        </label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Iniciar Sesión</span>
        <div class="spinner"></div>
      </button>

      <div class="error-msg" id="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Usuario o contraseña incorrectos. Intenta nuevamente.
      </div>
    </form>
  
  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.classList.add('loading');
    setTimeout(() => {
      btn.classList.remove('loading');
      const user = document.getElementById('usuario').value;
      const pass = document.getElementById('password').value;
      if (user && pass) {
        window.location.href = 'intertek_seguridad.html';
      } else {
        err.classList.add('show');
      }
    }, 1400);
  }
</script>
</body>
</html>
